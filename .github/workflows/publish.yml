name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run default test suite
        run: npm test

      - name: Read codex generator version
        id: codex-version
        run: |
          echo "version=$(node -p "JSON.parse(require('node:fs').readFileSync('./src/generated/manifest.json', 'utf8')).generator.version.replace(/^codex-cli\\s+/, '')")" >> "$GITHUB_OUTPUT"

      - name: Install matching codex CLI
        run: |
          npm install --global "@openai/codex@${{ steps.codex-version.outputs.version }}"
          codex --version

      - name: Run release validation
        run: npm run release:check

      - name: Publish package
        run: npm publish --access public
